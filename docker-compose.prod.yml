services:
  penalty-bot:
    image: ghcr.io/u-de-o/penalty-bot:latest
    env_file: .env
    environment:
      DB_JDBC_URL: ${DB_JDBC_URL:-jdbc:postgresql://db:5432/penalty-bot}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: penalty-bot
      POSTGRES_USER: penalty-bot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - penalty-bot-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U penalty-bot" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  penalty-bot-data: